<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1248 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1730"/>
      <stop offset="0.55" stop-color="#0a1222"/>
      <stop offset="1" stop-color="#081020"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0.5" cy="0.05" r="0.7">
      <stop offset="0" stop-color="#e8b923" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e8b923" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0b8"/>
      <stop offset="0.5" stop-color="#f4c84b"/>
      <stop offset="1" stop-color="#cf8f15"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c6b3a"/>
      <stop offset="1" stop-color="#0f3f22"/>
    </linearGradient>
    <radialGradient id="flare" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.3" stop-color="#ffe9a8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffe9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pitchGlow" cx="0.5" cy="1" r="0.6">
      <stop offset="0" stop-color="#e8b923" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e8b923" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky / stadium -->
  <rect width="1248" height="720" fill="url(#sky)"/>
  <rect width="1248" height="720" fill="url(#topGlow)"/>

  <!-- stand / crowd band -->
  <rect x="0" y="150" width="1248" height="300" fill="#0e1a33"/>
  <g fill="#1b2c52" opacity="0.6">
    <!-- crowd dots -->
    <g>
      <rect x="0" y="190" width="1248" height="2"/>
      <rect x="0" y="220" width="1248" height="2"/>
      <rect x="0" y="250" width="1248" height="2"/>
      <rect x="0" y="280" width="1248" height="2"/>
      <rect x="0" y="310" width="1248" height="2"/>
    </g>
  </g>
  <!-- floodlight rigs -->
  <g fill="#9fb4d8" opacity="0.5">
    <rect x="120" y="120" width="150" height="14" rx="4"/>
    <rect x="980" y="120" width="150" height="14" rx="4"/>
  </g>
  <circle cx="150" cy="150" r="80" fill="url(#flare)"/>
  <circle cx="1100" cy="150" r="80" fill="url(#flare)"/>
  <circle cx="624" cy="90" r="120" fill="url(#flare)" opacity="0.6"/>

  <!-- pitch -->
  <path d="M-40 560 Q624 470 1288 560 L1288 720 L-40 720 Z" fill="url(#pitch)"/>
  <path d="M-40 560 Q624 470 1288 560 L1288 720 L-40 720 Z" fill="url(#pitchGlow)"/>
  <!-- pitch stripes -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="2">
    <line x1="120" y1="720" x2="280" y2="540"/>
    <line x1="420" y1="720" x2="500" y2="528"/>
    <line x1="760" y1="720" x2="720" y2="528"/>
    <line x1="1080" y1="720" x2="940" y2="540"/>
  </g>
  <ellipse cx="624" cy="612" rx="150" ry="26" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- ===== Player silhouettes (4 stylised dribblers) ===== -->
  <g>
    <!-- jersey colors evoke Argentina / Spain / Man City / France -->
    <g transform="translate(300,300)">
      <use href="#player" fill="#7fb4e6"/>
      <rect x="-26" y="6" width="52" height="70" rx="10" fill="#8ec5ff"/>
      <rect x="-26" y="6" width="14" height="70" fill="#ffffff" opacity="0.5"/>
    </g>
    <g transform="translate(520,290)">
      <use href="#player" fill="#d33b34"/>
      <rect x="-26" y="6" width="52" height="70" rx="10" fill="#e03b34"/>
    </g>
    <g transform="translate(740,290)">
      <use href="#player" fill="#86c5ef"/>
      <rect x="-26" y="6" width="52" height="70" rx="10" fill="#9fd2f4"/>
    </g>
    <g transform="translate(960,300)">
      <use href="#player" fill="#2b3f86"/>
      <rect x="-26" y="6" width="52" height="70" rx="10" fill="#27347a"/>
    </g>
  </g>
  <!-- reusable player body -->
  <defs>
    <g id="player">
      <circle cx="0" cy="-22" r="20"/>
      <path d="M-26 6 q26 -18 52 0 l-4 78 q-22 12 -44 0 z"/>
      <path d="M-22 80 l-10 86 q10 8 20 0 l8 -78 z"/>
      <path d="M22 80 l14 84 q-8 10 -20 4 l-12 -80 z"/>
      <path d="M-26 18 l-40 36 q-4 12 8 12 l40 -28 z"/>
      <path d="M26 18 l42 30 q6 10 -6 14 l-40 -22 z"/>
    </g>
  </defs>

  <!-- soccer balls -->
  <g>
    <circle cx="430" cy="660" r="22" fill="#fff"/>
    <path d="M430 644 l10 8 -4 12 -12 0 -4 -12 z" fill="#1a2a4f"/>
    <circle cx="700" cy="668" r="22" fill="#fff"/>
    <path d="M700 652 l10 8 -4 12 -12 0 -4 -12 z" fill="#2f6bd0"/>
  </g>

  <!-- ===== Casino chips ===== -->
  <g>
    <g transform="translate(70,120)">
      <circle r="44" fill="#2f6bd0"/>
      <circle r="44" fill="none" stroke="#fff" stroke-width="6" stroke-dasharray="14 12"/>
      <circle r="30" fill="none" stroke="#fff" stroke-width="3"/>
      <text y="9" text-anchor="middle" font-size="26" font-weight="900" fill="#fff">C</text>
    </g>
    <g transform="translate(1170,250)">
      <circle r="40" fill="#e8b923"/>
      <circle r="40" fill="none" stroke="#fff" stroke-width="5" stroke-dasharray="12 10"/>
      <circle r="27" fill="none" stroke="#7a5400" stroke-width="3"/>
      <text y="8" text-anchor="middle" font-size="22" font-weight="900" fill="#7a5400">C</text>
    </g>
    <g transform="translate(110,640)">
      <circle r="38" fill="#e8b923"/>
      <circle r="38" fill="none" stroke="#fff" stroke-width="5" stroke-dasharray="12 10"/>
      <circle r="25" fill="none" stroke="#7a5400" stroke-width="3"/>
    </g>
    <g transform="translate(1150,610)">
      <circle r="42" fill="#2f6bd0"/>
      <circle r="42" fill="none" stroke="#fff" stroke-width="6" stroke-dasharray="14 12"/>
      <circle r="28" fill="none" stroke="#fff" stroke-width="3"/>
    </g>
  </g>

  <!-- ===== Title ===== -->
  <g text-anchor="middle">
    <text x="626" y="158" font-size="92" font-weight="900" letter-spacing="2" fill="#000" opacity="0.45">SPORTS CASINO 2026</text>
    <text x="624" y="154" font-size="92" font-weight="900" letter-spacing="2" fill="url(#gold)" stroke="#7a5400" stroke-width="1.2">SPORTS CASINO 2026</text>
  </g>

  <!-- ===== Subtitle bar ===== -->
  <rect x="0" y="664" width="1248" height="56" fill="#060c18" opacity="0.65"/>
  <text x="624" y="701" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="1">
    Live Soccer <tspan fill="#e8b923">•</tspan> Premium Betting
  </text>
</svg>
