<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0911"/><stop offset="1" stop-color="#12111f"/></linearGradient>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="560" fill="url(#dbg)"/>
  <text x="40" y="48" font-size="24" font-weight="800" fill="#fff">Odds Data Flow &amp; Quota Protection</text>
  <text x="40" y="74" font-size="14" fill="#64748b">How a sportsbook page renders live odds — with caching, mock fallback and a single fan-out call.</text>

  <!-- lanes -->
  <g font-size="13" font-weight="800">
    <rect x="40"  y="110" width="200" height="60" rx="12" fill="#171527" stroke="#7c5cff" stroke-opacity="0.4"/><text x="140" y="146" text-anchor="middle" fill="#9d7bff">Browser</text>
    <rect x="300" y="110" width="200" height="60" rx="12" fill="#171527" stroke="#00e701" stroke-opacity="0.4"/><text x="400" y="146" text-anchor="middle" fill="#3dff7a">Express Route</text>
    <rect x="560" y="110" width="200" height="60" rx="12" fill="#171527" stroke="#22d3ee" stroke-opacity="0.4"/><text x="660" y="146" text-anchor="middle" fill="#22d3ee">oddsApi service</text>
    <rect x="820" y="110" width="160" height="60" rx="12" fill="#171527" stroke="#ffb800" stroke-opacity="0.4"/><text x="900" y="146" text-anchor="middle" fill="#ffb800">TTL Cache</text>
    <rect x="1010" y="110" width="150" height="60" rx="12" fill="#171527" stroke="#ff4d8d" stroke-opacity="0.4"/><text x="1085" y="140" text-anchor="middle" fill="#ff4d8d">The Odds</text><text x="1085" y="158" text-anchor="middle" fill="#ff4d8d">API</text>
  </g>

  <!-- lifelines -->
  <g stroke="#ffffff" stroke-opacity="0.07" stroke-dasharray="3 5">
    <line x1="140" y1="170" x2="140" y2="520"/>
    <line x1="400" y1="170" x2="400" y2="520"/>
    <line x1="660" y1="170" x2="660" y2="520"/>
    <line x1="900" y1="170" x2="900" y2="520"/>
    <line x1="1085" y1="170" x2="1085" y2="520"/>
  </g>

  <g font-size="12" fill="#cbd5e1">
    <line x1="140" y1="205" x2="395" y2="205" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="150" y="198">GET /api/featured</text>

    <line x1="400" y1="240" x2="655" y2="240" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="410" y="233">getFeaturedFeed()  · Promise.all over sports[]</text>

    <line x1="660" y1="275" x2="895" y2="275" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="668" y="268">lookup odds:{sportKey}</text>

    <line x1="895" y1="310" x2="665" y2="310" stroke="#00e701" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="668" y="303" fill="#3dff7a">HIT → return cached (no quota spent)</text>

    <line x1="660" y1="352" x2="1080" y2="352" stroke="#ff4d8d" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#a)"/>
    <text x="668" y="345" fill="#ff8db4">MISS → fetch /v4/sports/{key}/odds  (1 credit)</text>

    <line x1="1085" y1="388" x2="665" y2="388" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="700" y="381">bookmakers[].markets[].outcomes[]  + x-requests-remaining</text>

    <line x1="660" y1="424" x2="895" y2="424" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="668" y="417">setCached(ttl 60s)</text>

    <line x1="660" y1="455" x2="405" y2="455" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#a)"/>
    <line x1="400" y1="486" x2="145" y2="486" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="150" y="479">{ feed, quota }  → render EventCards</text>
  </g>

  <!-- fallback note -->
  <rect x="560" y="505" width="600" height="40" rx="10" fill="#7c5cff" fill-opacity="0.08"/>
  <text x="576" y="530" font-size="12" fill="#9d7bff">⚠ No ODDS_API_KEY or upstream error → service returns deterministic mockOdds() with identical shape.</text>
</svg>
