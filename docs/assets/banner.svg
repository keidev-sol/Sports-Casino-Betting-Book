<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0911"/>
      <stop offset="0.5" stop-color="#12111f"/>
      <stop offset="1" stop-color="#0d0c16"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9d7bff"/>
      <stop offset="1" stop-color="#ff4d8d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff4d8d" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff4d8d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <circle cx="980" cy="60" r="260" fill="url(#glow1)"/>
  <circle cx="1120" cy="320" r="220" fill="url(#glow2)"/>

  <!-- grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(70,70)">
    <rect width="64" height="64" rx="16" fill="#0d0c16" stroke="url(#brand)" stroke-width="2"/>
    <text x="32" y="48" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="url(#brand)" text-anchor="middle">C</text>
    <circle cx="48" cy="20" r="5" fill="#00e701"/>
  </g>

  <text x="150" y="100" font-size="52" font-weight="900" fill="#ffffff">Cr<tspan fill="url(#brand)">ow</tspan></text>
  <text x="152" y="132" font-size="19" font-weight="600" fill="#94a3b8" letter-spacing="2">CRYPTO SPORTSBOOK · CASINO · ORIGINALS</text>

  <!-- crash curve motif -->
  <g transform="translate(70,180)">
    <polyline points="0,150 120,140 250,110 380,70 520,20" fill="none" stroke="#00e701" stroke-width="4" stroke-linecap="round"/>
    <polygon points="0,150 120,140 250,110 380,70 520,20 520,150" fill="#00e701" fill-opacity="0.08"/>
    <circle cx="520" cy="20" r="7" fill="#00e701"/>
    <text x="540" y="28" font-size="26" font-weight="800" font-family="JetBrains Mono, monospace" fill="#00e701">12.48×</text>
  </g>

  <!-- feature chips -->
  <g font-size="15" font-weight="700">
    <g transform="translate(760,150)">
      <rect width="170" height="40" rx="20" fill="#7c5cff" fill-opacity="0.14"/>
      <circle cx="24" cy="20" r="5" fill="#7c5cff"/>
      <text x="40" y="25" fill="#9d7bff">40+ Live Sports</text>
    </g>
    <g transform="translate(945,150)">
      <rect width="180" height="40" rx="20" fill="#00e701" fill-opacity="0.12"/>
      <circle cx="24" cy="20" r="5" fill="#00e701"/>
      <text x="40" y="25" fill="#3dff7a">Provably Fair</text>
    </g>
    <g transform="translate(760,205)">
      <rect width="170" height="40" rx="20" fill="#ffb800" fill-opacity="0.12"/>
      <circle cx="24" cy="20" r="5" fill="#ffb800"/>
      <text x="40" y="25" fill="#ffb800">Live Jackpots</text>
    </g>
    <g transform="translate(945,205)">
      <rect width="180" height="40" rx="20" fill="#ff4d8d" fill-opacity="0.12"/>
      <circle cx="24" cy="20" r="5" fill="#ff4d8d"/>
      <text x="40" y="25" fill="#ff4d8d">Instant Payouts</text>
    </g>
  </g>

  <text x="70" y="335" font-size="14" fill="#475569">React · Vite · Tailwind · Node · Express · WebSockets · The Odds API</text>
</svg>
