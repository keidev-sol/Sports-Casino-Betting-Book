<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0911"/><stop offset="1" stop-color="#12111f"/></linearGradient>
    <marker id="pa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00e701"/></marker>
  </defs>
  <rect width="1200" height="460" fill="url(#pbg)"/>
  <text x="40" y="50" font-size="24" font-weight="800" fill="#fff">Provably-Fair Round Lifecycle</text>
  <text x="40" y="76" font-size="14" fill="#64748b">Commit-and-reveal: players can verify the outcome was fixed before any bet was placed.</text>

  <!-- step boxes -->
  <g>
    <rect x="40" y="120" width="250" height="150" rx="16" fill="#0d0c16" stroke="#7c5cff" stroke-opacity="0.5"/>
    <circle cx="70" cy="150" r="14" fill="#7c5cff"/><text x="70" y="155" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">1</text>
    <text x="96" y="155" font-size="15" font-weight="800" fill="#9d7bff">COMMIT</text>
    <text x="60" y="190" font-size="12.5" fill="#cbd5e1">serverSeed = random(32B)</text>
    <text x="60" y="214" font-size="12.5" fill="#cbd5e1">hash = SHA256(serverSeed)</text>
    <text x="60" y="246" font-size="12" fill="#64748b">Published to players</text>
    <text x="60" y="262" font-size="12" fill="#64748b">before betting opens.</text>

    <rect x="330" y="120" width="250" height="150" rx="16" fill="#0d0c16" stroke="#22d3ee" stroke-opacity="0.5"/>
    <circle cx="360" cy="150" r="14" fill="#22d3ee"/><text x="360" y="155" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">2</text>
    <text x="386" y="155" font-size="15" font-weight="800" fill="#22d3ee">BET</text>
    <text x="350" y="190" font-size="12.5" fill="#cbd5e1">clientSeed (public)</text>
    <text x="350" y="214" font-size="12.5" fill="#cbd5e1">nonce += 1 per round</text>
    <text x="350" y="246" font-size="12" fill="#64748b">Players place wagers</text>
    <text x="350" y="262" font-size="12" fill="#64748b">against the committed hash.</text>

    <rect x="620" y="120" width="250" height="150" rx="16" fill="#0d0c16" stroke="#ffb800" stroke-opacity="0.5"/>
    <circle cx="650" cy="150" r="14" fill="#ffb800"/><text x="650" y="155" text-anchor="middle" font-size="14" font-weight="800" fill="#000">3</text>
    <text x="676" y="155" font-size="15" font-weight="800" fill="#ffb800">DERIVE</text>
    <text x="640" y="190" font-size="12" fill="#cbd5e1">HMAC_SHA256(serverSeed,</text>
    <text x="640" y="208" font-size="12" fill="#cbd5e1">  clientSeed:nonce)</text>
    <text x="640" y="234" font-size="12.5" fill="#cbd5e1">→ crash bust / wheel slot</text>
    <text x="640" y="262" font-size="12" fill="#64748b">House edge baked in.</text>

    <rect x="910" y="120" width="250" height="150" rx="16" fill="#0d0c16" stroke="#00e701" stroke-opacity="0.5"/>
    <circle cx="940" cy="150" r="14" fill="#00e701"/><text x="940" y="155" text-anchor="middle" font-size="14" font-weight="800" fill="#000">4</text>
    <text x="966" y="155" font-size="15" font-weight="800" fill="#3dff7a">REVEAL</text>
    <text x="930" y="190" font-size="12.5" fill="#cbd5e1">serverSeed published</text>
    <text x="930" y="214" font-size="12.5" fill="#cbd5e1">in round history</text>
    <text x="930" y="246" font-size="12" fill="#64748b">Anyone re-computes the</text>
    <text x="930" y="262" font-size="12" fill="#64748b">hash &amp; result to verify.</text>
  </g>

  <line x1="290" y1="195" x2="328" y2="195" stroke="#00e701" stroke-width="2.5" marker-end="url(#pa)"/>
  <line x1="580" y1="195" x2="618" y2="195" stroke="#00e701" stroke-width="2.5" marker-end="url(#pa)"/>
  <line x1="870" y1="195" x2="908" y2="195" stroke="#00e701" stroke-width="2.5" marker-end="url(#pa)"/>

  <!-- verify equation -->
  <rect x="40" y="320" width="1120" height="90" rx="14" fill="#171527"/>
  <text x="64" y="352" font-size="13" font-weight="800" fill="#fff">VERIFY  ✓</text>
  <text x="64" y="380" font-size="14" font-family="JetBrains Mono, monospace" fill="#3dff7a">SHA256(revealedServerSeed) == publishedHash</text>
  <text x="64" y="400" font-size="13" font-family="JetBrains Mono, monospace" fill="#94a3b8">and  HMAC(revealedServerSeed, clientSeed:nonce) → identical outcome</text>
  <text x="720" y="372" font-size="12" fill="#64748b">Implemented in server/src/services/provablyFair.js —</text>
  <text x="720" y="392" font-size="12" fill="#64748b">shared by Crash, Roulette, Jackpot and Dice.</text>
</svg>
